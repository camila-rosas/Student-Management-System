<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Catalog</title>
  <link rel="stylesheet" href="s_portal_style.css">
</head>
<body>
  <aside class="portal-sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <div class="brand-icon">
          <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/UTA_logomark.png" alt="School Logo">
        </div>
        <div class="brand-copy">
          <div class="brand-title">Student Portal</div>
          <div class="brand-subtitle">Management System</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a class="sidebar-link" href="studentHomepage.html">◫ Dashboard</a>
        <a class="sidebar-link active" href="s_course_catalog.html">📖 Course Catalog</a>
        <a class="sidebar-link" href="my_courses.html">🎓 My Courses</a>
        <a class="sidebar-link" href="s_billing.html">💲 Billing</a>
      </nav>
    </div>

    <div class="sidebar-bottom">
      <div class="user-card">
        <div class="avatar">ST</div>
        <div class="user-text">
          <div class="user-name">Student</div>
          <div class="user-role">Student</div>
        </div>
      </div>

      <a class="sign-out" href="index.html">↪ Sign Out</a>
    </div>
  </aside>

  <div class="page-shell">
    <header class="topbar">
      <div class="term">Fall 2026</div>

      <div class="bell-wrap" data-notices='[
        "Registration is open for Fall 2026.",
        "Enrollments update your student record immediately."
      ]'>
        <button class="bell-btn" type="button" aria-label="Notifications">
          🔔
          <span class="badge">2</span>
        </button>

        <div class="notice-panel">
          <div class="notice-head">Notifications</div>
          <div class="notice-list"></div>
          <button class="notice-clear" type="button">Clear All</button>
        </div>
      </div>
    </header>

    <main class="page-content">
      <h1 class="page-title">Course Catalog</h1>
      <p class="page-subtitle">Browse and register for courses for Fall 2026</p>

      <div class="search-row">
        <input class="search-input" type="text" placeholder="Search by course code, name, or instructor...">
        <select>
          <option>All Courses</option>
          <option>Open Seats</option>
          <option>3 Hours</option>
          <option>4 Hours</option>
        </select>
      </div>

      <div class="alert-bar">ⓘ Loading live course catalog...</div>

      <section class="catalog-grid">
        <div class="empty-wrap">
          <div class="empty-icon">📖</div>
          <div class="empty-title">Loading Courses</div>
          <div class="empty-copy">Please wait while the course catalog loads.</div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="s_portal.js"></script>
  <script src="catalog.js"></script>
</body>
</html>
